<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; overflow-x: hidden; }

#setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 18px; padding: 24px; }
#setup h1 { font-size: 2rem; font-weight: 800; color: #f0c040; }
#setup .rule-box { background: #16213e; border-radius: 14px; padding: 14px 18px; max-width: 320px; font-size: 0.83rem; color: #aaa; line-height: 1.8; }
.section-label { font-size: 0.82rem; color: #888; margin-bottom: 6px; text-align: center; }
.btn-row { display: flex; gap: 10px; justify-content: center; }
.sel-btn { padding: 11px 26px; font-size: 0.95rem; font-weight: 700; border: 2px solid #444; background: #16213e; color: #eee; border-radius: 12px; cursor: pointer; }
.sel-btn.active { border-color: #f0c040; background: #f0c040; color: #1a1a2e; }
.diff-cards { display: flex; gap: 10px; justify-content: center; }
.diff-card { width: 100px; padding: 14px 8px; border-radius: 12px; border: 2px solid #333; background: #16213e; cursor: pointer; text-align: center; }
.diff-card .dicon { font-size: 1.4rem; margin-bottom: 4px; }
.diff-card .dname { font-size: 0.9rem; font-weight: 700; }
.diff-card .ddesc { font-size: 0.7rem; color: #777; margin-top: 3px; }
.diff-card.active { border-color: #f0c040; }
.player-names { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 280px; }
.pname-input { padding: 10px 14px; font-size: 0.9rem; border-radius: 10px; border: 1.5px solid #333; background: #16213e; color: #eee; outline: none; }
.pname-input:focus { border-color: #f0c040; }
.start-btn { padding: 14px 44px; font-size: 1.05rem; font-weight: 800; background: #f0c040; color: #1a1a2e; border: none; border-radius: 14px; cursor: pointer; }

#game { display: none; flex-direction: column; min-height: 100vh; }
.scoreboard { display: flex; background: #16213e; border-bottom: 1px solid #2a2a4a; }
.score-cell { flex: 1; padding: 7px 4px; text-align: center; border-right: 1px solid #2a2a4a; transition: background 0.2s; }
.score-cell:last-child { border-right: none; }
.score-cell.active-turn { background: #f0c040; color: #1a1a2e; }
.score-name { font-size: 0.68rem; font-weight: 600; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 2px; }
.score-val { font-size: 1.2rem; font-weight: 800; }
.turn-banner { text-align: center; padding: 7px; background: #0f3460; font-size: 0.85rem; color: #f0c040; font-weight: 700; }

.hand-area { padding: 8px 12px; background: #12122a; border-bottom: 1px solid #2a2a4a; }
.hand-label { font-size: 0.72rem; color: #888; margin-bottom: 6px; }
.hand-cards { display: flex; gap: 8px; flex-wrap: wrap; }
.hand-card { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; border-radius: 10px; cursor: pointer; border: 2px solid #444; background: #1e1e3e; transition: transform 0.1s, border-color 0.15s; }
.hand-card:active { transform: scale(0.9); }
.hand-card.selected { border-color: #f0c040; background: #2a2a5e; transform: scale(1.08); }
.hand-card.blocked { opacity: 0.3; cursor: default; border-color: #333; }

.grid-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; overflow: auto; }
.grid { display: grid; gap: 5px; }
.cell { display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 8px; cursor: pointer; border: 2px solid #2a2a4a; background: #16213e; transition: transform 0.1s, background 0.15s; }
.cell:active { transform: scale(0.93); }
.cell.empty { color: #444; font-size: 0.7rem; }
.cell.placeable { border-color: #f0c040; background: #1e1e2e; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{border-color:#f0c040} 50%{border-color:#555} }
.cell.owned-p1 { background: #7b241c; border-color: #e74c3c; color: #fff; }
.cell.owned-p2 { background: #1a5e3a; border-color: #27ae60; color: #fff; }
.cell.owned-p3 { background: #5b2c8a; border-color: #9b59b6; color: #fff; }
.cell.conquered { animation: conquer 0.4s; }
@keyframes conquer { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

.info-bar { padding: 7px 12px; text-align: center; font-size: 0.8rem; color: #aaa; min-height: 30px; }
.info-bar b { color: #f0c040; }
.bottom-bar { padding: 7px 12px 14px; display: flex; justify-content: center; gap: 10px; }
.action-btn { padding: 8px 16px; border-radius: 9px; font-size: 0.82rem; font-weight: 700; border: 1.5px solid #444; background: #16213e; color: #eee; cursor: pointer; }

#result { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 24px; text-align: center; }
#result h2 { font-size: 1.8rem; font-weight: 800; color: #f0c040; }
.final-scores { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 280px; }
.final-row { display: flex; justify-content: space-between; align-items: center; background: #16213e; border-radius: 12px; padding: 11px 16px; }
.final-row.winner { border: 2px solid #f0c040; }
.final-row .fname { font-size: 0.95rem; font-weight: 700; }
.final-row .fscore { font-size: 1.1rem; font-weight: 800; color: #f0c040; }
.replay-btn { padding: 12px 36px; font-size: 1rem; font-weight: 800; background: #f0c040; color: #1a1a2e; border: none; border-radius: 14px; cursor: pointer; }
</style>
</head>
<body>

<div id="setup">
  <h1>🗺️ 숫자 땅따먹기</h1>
  <div class="rule-box">
    ✔ 매 턴 랜덤 숫자 3개 중 하나 선택<br>
    ✔ 빈 칸 또는 이웃 칸보다 <b style="color:#f0c040">큰 숫자</b>면 내 땅!<br>
    ✔ 남의 땅도 더 큰 숫자로 빼앗기 가능<br>
    ✔ 못 놓으면 자동 턴 넘김 — 모두 막히면 종료
  </div>
  <div>
    <div class="section-label">인원수</div>
    <div class="btn-row">
      <button class="sel-btn active" onclick="setCount(2)">2명</button>
      <button class="sel-btn" onclick="setCount(3)">3명</button>
    </div>
  </div>
  <div>
    <div class="section-label">판 크기</div>
    <div class="diff-cards">
      <div class="diff-card active" id="diff-small" onclick="setDiff('small')">
        <div class="dicon">🟢</div>
        <div class="dname">초급</div>
        <div class="ddesc">4×4</div>
      </div>
      <div class="diff-card" id="diff-mid" onclick="setDiff('mid')">
        <div class="dicon">🟡</div>
        <div class="dname">중급</div>
        <div class="ddesc">5×5</div>
      </div>
      <div class="diff-card" id="diff-large" onclick="setDiff('large')">
        <div class="dicon">🔴</div>
        <div class="dname">고급</div>
        <div class="ddesc">6×6</div>
      </div>
    </div>
  </div>
  <div class="player-names" id="name-inputs"></div>
  <button class="start-btn" onclick="startGame()">게임 시작!</button>
</div>

<div id="game">
  <div class="scoreboard" id="scoreboard"></div>
  <div class="turn-banner" id="turn-banner"></div>
  <div class="hand-area">
    <div class="hand-label" id="hand-label">이번 턴 숫자 — 하나 골라서 칸을 눌러봐</div>
    <div class="hand-cards" id="hand-cards"></div>
  </div>
  <div class="grid-area"><div class="grid" id="grid"></div></div>
  <div class="info-bar" id="info-bar"></div>
  <div class="bottom-bar">
    <button class="action-btn" onclick="startGame()">다시 시작</button>
    <button class="action-btn" onclick="goSetup()">설정으로</button>
  </div>
</div>

<div id="result">
  <h2 id="result-title"></h2>
  <div class="final-scores" id="final-scores"></div>
  <button class="replay-btn" onclick="startGame()">한 판 더!</button>
  <button class="action-btn" onclick="goSetup()">설정으로</button>
</div>

<script>
let numPlayers = 2;
let difficulty = 'small';
let playerNames = [];
let scores, currentPlayer, board, owners, selectedCard, hand, locked, skippedCount;

const DIFF = { small:{rows:4,cols:4}, mid:{rows:5,cols:5}, large:{rows:6,cols:6} };
const P_COLORS = ['owned-p1','owned-p2','owned-p3'];

function setCount(n) {
  numPlayers = n;
  document.querySelectorAll('.sel-btn').forEach((b,i)=>b.classList.toggle('active',i===n-2));
  renderNameInputs();
}
function setDiff(d) {
  difficulty = d;
  ['small','mid','large'].forEach(k=>document.getElementById('diff-'+k).classList.toggle('active',k===d));
}
function renderNameInputs() {
  const c = document.getElementById('name-inputs');
  const defs = ['1P','2P','3P'];
  c.innerHTML = '';
  for(let i=0;i<numPlayers;i++){
    const inp = document.createElement('input');
    inp.className = 'pname-input';
    inp.placeholder = defs[i]+' 이름';
    inp.value = playerNames[i]||'';
    inp.oninput = e => { playerNames[i]=e.target.value; };
    c.appendChild(inp);
  }
}

function startGame() {
  const inputs = document.querySelectorAll('.pname-input');
  const defs = ['1P','2P','3P'];
  playerNames = [];
  for(let i=0;i<numPlayers;i++){
    const v = inputs[i]?inputs[i].value.trim():'';
    playerNames.push(v||defs[i]);
  }
  const {rows,cols} = DIFF[difficulty];
  scores = Array(numPlayers).fill(0);
  currentPlayer = 0;
  board = Array(rows*cols).fill(0);
  owners = Array(rows*cols).fill(-1);
  selectedCard = null;
  locked = false;
  skippedCount = 0;
  hand = dealHand();

  document.getElementById('setup').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('game').style.display='flex';

  renderScoreboard();
  renderHand();
  renderGrid();
  updateTurnBanner();
  document.getElementById('info-bar').innerHTML = '숫자를 고른 뒤 칸을 눌러봐!';

  // check if first player is immediately blocked
  checkAndAutoSkip();
}

function dealHand() {
  return [1,2,3].map(()=>Math.floor(Math.random()*9)+1);
}

function canPlaceAny(handArr) {
  const {rows,cols} = DIFF[difficulty];
  const total = rows*cols;
  for(const val of handArr){
    for(let idx=0;idx<total;idx++){
      if(canPlace(idx,val)) return true;
    }
  }
  return false;
}

function checkAndAutoSkip() {
  if(canPlaceAny(hand)) {
    skippedCount = 0;
    return;
  }
  // this player is blocked
  skippedCount++;
  if(skippedCount >= numPlayers) {
    // everyone blocked → end game
    setTimeout(showResult, 300);
    return;
  }
  document.getElementById('info-bar').innerHTML = `⛔ ${playerNames[currentPlayer]}은 놓을 수 없어! 자동 넘김`;
  setTimeout(()=>{
    currentPlayer = (currentPlayer+1) % numPlayers;
    hand = dealHand();
    renderHand();
    updateTurnBanner();
    renderScoreboard();
    checkAndAutoSkip();
  }, 1200);
}

function canPlace(idx, val) {
  const {rows,cols} = DIFF[difficulty];
  if(board[idx] === 0) {
    const neighbors = getNeighbors(idx,rows,cols);
    for(const n of neighbors){
      if(board[n] >= val) return false;
    }
    return true;
  }
  return val > board[idx];
}

function getNeighbors(idx, rows, cols) {
  const r = Math.floor(idx/cols), c = idx%cols;
  const ns = [];
  if(r>0) ns.push((r-1)*cols+c);
  if(r<rows-1) ns.push((r+1)*cols+c);
  if(c>0) ns.push(r*cols+(c-1));
  if(c<cols-1) ns.push(r*cols+(c+1));
  return ns;
}

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  const cellCounts = Array(numPlayers).fill(0);
  owners.forEach(o=>{ if(o>=0) cellCounts[o]++; });
  playerNames.forEach((name,i)=>{
    const cell = document.createElement('div');
    cell.className='score-cell'+(i===currentPlayer?' active-turn':'');
    cell.id='score-cell-'+i;
    cell.innerHTML=`<div class="score-name">${name}</div><div class="score-val">${cellCounts[i]}칸</div>`;
    sb.appendChild(cell);
  });
}

function updateTurnBanner() {
  document.getElementById('turn-banner').textContent = playerNames[currentPlayer]+'의 차례';
}

function renderHand() {
  const hc = document.getElementById('hand-cards');
  hc.innerHTML = '';
  const allBlocked = !canPlaceAny(hand);
  hand.forEach((val,i)=>{
    const card = document.createElement('div');
    const isBlocked = allBlocked || !canPlaceAnyWithVal(val);
    card.className='hand-card'+(selectedCard===i?' selected':'')+(isBlocked?' blocked':'');
    card.textContent = val;
    if(!isBlocked) card.onclick = () => selectCard(i);
    hc.appendChild(card);
  });
  document.getElementById('hand-label').textContent = allBlocked
    ? '놓을 수 있는 칸이 없어...'
    : '이번 턴 숫자 — 하나 골라서 칸을 눌러봐';
}

function canPlaceAnyWithVal(val) {
  const {rows,cols} = DIFF[difficulty];
  for(let idx=0;idx<rows*cols;idx++){
    if(canPlace(idx,val)) return true;
  }
  return false;
}

function selectCard(i) {
  if(locked) return;
  selectedCard = (selectedCard===i) ? null : i;
  renderHand();
  highlightPlaceable();
  if(selectedCard!==null)
    document.getElementById('info-bar').innerHTML = `<b>${hand[selectedCard]}</b> 선택! 이제 놓을 칸을 눌러봐`;
  else
    document.getElementById('info-bar').innerHTML = '숫자를 고른 뒤 칸을 눌러봐!';
}

function highlightPlaceable() {
  const {rows,cols} = DIFF[difficulty];
  for(let idx=0;idx<rows*cols;idx++){
    const el = document.getElementById('cell-'+idx);
    if(!el) continue;
    if(selectedCard===null){ el.classList.remove('placeable'); continue; }
    if(canPlace(idx, hand[selectedCard])) el.classList.add('placeable');
    else el.classList.remove('placeable');
  }
}

function renderGrid() {
  const {rows,cols} = DIFF[difficulty];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const sz = difficulty==='large'?56:difficulty==='mid'?62:68;
  grid.style.gridTemplateColumns=`repeat(${cols}, ${sz}px)`;
  for(let idx=0;idx<rows*cols;idx++){
    const cell = document.createElement('div');
    cell.id='cell-'+idx;
    cell.style.width=sz+'px';
    cell.style.height=sz+'px';
    cell.style.fontSize = difficulty==='large'?'1.1rem':'1.25rem';
    const o = owners[idx];
    cell.className = o===-1 ? 'cell empty' : 'cell '+P_COLORS[o];
    cell.textContent = o===-1 ? '' : board[idx];
    cell.onclick=()=>onCellClick(idx);
    grid.appendChild(cell);
  }
}

function updateCell(idx) {
  const el = document.getElementById('cell-'+idx);
  if(!el) return;
  const o = owners[idx];
  el.className = o===-1 ? 'cell empty' : 'cell '+P_COLORS[o]+' conquered';
  el.textContent = o===-1 ? '' : board[idx];
  if(o!==-1) setTimeout(()=>el.classList.remove('conquered'),400);
  if(selectedCard!==null && canPlace(idx, hand[selectedCard])) el.classList.add('placeable');
}

function onCellClick(idx) {
  if(locked) return;
  if(selectedCard===null){
    document.getElementById('info-bar').innerHTML='먼저 위에서 숫자를 골라봐!';
    return;
  }
  const val = hand[selectedCard];
  if(!canPlace(idx, val)){
    document.getElementById('info-bar').innerHTML=`❌ 여기엔 <b>${val}</b> 못 놔! 더 큰 숫자가 필요해`;
    return;
  }

  const wasOwner = owners[idx];
  const prevVal = board[idx];
  board[idx] = val;
  owners[idx] = currentPlayer;
  updateCell(idx);

  if(wasOwner!==-1 && wasOwner!==currentPlayer)
    document.getElementById('info-bar').innerHTML=`⚔️ ${playerNames[currentPlayer]}이 <b>${prevVal}→${val}</b>로 빼앗았다!`;
  else if(wasOwner===-1)
    document.getElementById('info-bar').innerHTML=`✅ <b>${val}</b> 놓기 성공!`;
  else
    document.getElementById('info-bar').innerHTML=`🔼 <b>${prevVal}→${val}</b> 강화 성공!`;

  hand.splice(selectedCard,1);
  selectedCard = null;
  highlightPlaceable();

  renderScoreboard();

  // check all filled
  const {rows,cols} = DIFF[difficulty];
  if(owners.filter(o=>o>=0).length === rows*cols){
    setTimeout(showResult,500);
    return;
  }

  currentPlayer = (currentPlayer+1) % numPlayers;
  hand = dealHand();
  locked = false;
  renderHand();
  updateTurnBanner();
  renderScoreboard();
  checkAndAutoSkip();
}

function showResult() {
  document.getElementById('game').style.display='none';
  document.getElementById('result').style.display='flex';
  const cellCounts = Array(numPlayers).fill(0);
  owners.forEach(o=>{ if(o>=0) cellCounts[o]++; });
  const maxC = Math.max(...cellCounts);
  const winners = playerNames.filter((_,i)=>cellCounts[i]===maxC);
  document.getElementById('result-title').textContent = winners.length===1?`🏆 ${winners[0]} 승리!`:`🏆 ${winners.join(' & ')} 동점!`;
  const ranked = playerNames.map((n,i)=>({n,c:cellCounts[i]})).sort((a,b)=>b.c-a.c);
  const fs = document.getElementById('final-scores');
  fs.innerHTML='';
  ranked.forEach((r,i)=>{
    const row=document.createElement('div');
    row.className='final-row'+(i===0?' winner':'');
    row.innerHTML=`<span class="fname">${['🥇','🥈','🥉'][i]} ${r.n}</span><span class="fscore">${r.c}칸</span>`;
    fs.appendChild(row);
  });
}

function goSetup(){
  document.getElementById('game').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('setup').style.display='flex';
  renderNameInputs();
}

renderNameInputs();
</script>
</body>
</html>
