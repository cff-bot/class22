<html lang="ko">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  :root {
    --green: #2e8b57;
    --green-light: #52c47a;
    --green-pale: #e8f8ef;
    --green-mid: #b2e8c8;
    --yellow: #ffd84d;
    --yellow-pale: #fffbea;
    --red: #e05555;
    --red-pale: #fdeaea;
    --gray: #555;
    --bg: #f4fdf7;
    --white: #ffffff;
    --shadow: 0 4px 18px rgba(46,139,87,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── 헤더 ── */
  header {
    background: var(--green);
    color: white;
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 12px
    );
  }
  header h1 {
    font-family: 'Gaegu', cursive;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    position: relative;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.18);
  }
  header p {
    font-size: 0.92rem;
    opacity: 0.88;
    margin-top: 6px;
    position: relative;
  }

  /* ── 진행 바 ── */
  .progress-wrap {
    background: #d4f0e0;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 8px rgba(46,139,87,0.10);
  }
  .progress-bar-bg {
    flex: 1;
    height: 12px;
    background: #b2e8c8;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-light));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--green);
    min-width: 54px;
    text-align: right;
  }
  .score-badge {
    background: var(--green);
    color: white;
    font-size: 0.82rem;
    font-weight: 800;
    border-radius: 20px;
    padding: 4px 12px;
    min-width: 68px;
    text-align: center;
  }

  /* ── 문제 카드 ── */
  .quiz-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .q-card {
    background: white;
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 22px 22px 18px;
    border: 2px solid transparent;
    transition: border 0.2s;
    position: relative;
  }
  .q-card.answered-correct { border-color: var(--green-light); background: #f0fdf6; }
  .q-card.answered-wrong   { border-color: #f0a0a0; background: var(--red-pale); }

  .q-num {
    font-family: 'Gaegu', cursive;
    font-size: 0.82rem;
    font-weight: 700;
    color: white;
    background: var(--green);
    border-radius: 10px;
    padding: 2px 10px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .q-type-badge {
    font-size: 0.72rem;
    background: var(--green-pale);
    color: var(--green);
    border-radius: 8px;
    padding: 2px 9px;
    margin-left: 6px;
    font-weight: 700;
    vertical-align: middle;
  }

  .q-text {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a3a2a;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .q-text .keyword {
    color: var(--green);
    font-family: 'Gaegu', cursive;
    font-size: 1.25rem;
    background: var(--green-pale);
    padding: 1px 6px;
    border-radius: 6px;
  }
  .q-text .def {
    font-style: italic;
    color: #444;
    font-weight: 400;
    font-size: 0.96rem;
    background: #f9f9f9;
    border-left: 3px solid var(--green-mid);
    padding: 6px 10px;
    border-radius: 0 8px 8px 0;
    display: block;
    margin-top: 4px;
  }

  /* ── 선택지 ── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 440px) { .options { grid-template-columns: 1fr; } }

  .opt-btn {
    background: var(--green-pale);
    border: 2px solid var(--green-mid);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.93rem;
    font-weight: 700;
    color: #1a3a2a;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    position: relative;
  }
  .opt-btn:hover:not(:disabled) {
    background: #c5f0d8;
    border-color: var(--green);
    transform: translateY(-2px);
  }
  .opt-btn.correct {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .opt-btn.wrong {
    background: var(--red);
    border-color: var(--red);
    color: white;
    text-decoration: line-through;
  }
  .opt-btn.reveal {
    background: var(--green-light);
    border-color: var(--green);
    color: white;
  }
  .opt-btn:disabled { cursor: default; transform: none; }

  .feedback {
    margin-top: 12px;
    font-size: 0.88rem;
    font-weight: 700;
    border-radius: 10px;
    padding: 8px 14px;
    display: none;
    align-items: center;
    gap: 6px;
  }
  .feedback.show { display: flex; }
  .feedback.ok  { background: #d4f5e6; color: #1a6e3e; }
  .feedback.no  { background: var(--red-pale); color: #b03030; }

  /* ── 결과 카드 ── */
  #result-section {
    display: none;
    max-width: 680px;
    margin: 32px auto 0;
    padding: 0 20px;
  }
  .result-card {
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(46,139,87,0.18);
    padding: 40px 32px;
    text-align: center;
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 10px; }
  .result-score {
    font-family: 'Gaegu', cursive;
    font-size: 3rem;
    color: var(--green);
    font-weight: 700;
  }
  .result-msg {
    font-size: 1rem;
    color: #444;
    margin-top: 8px;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .retry-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 36px;
    font-family: 'Gaegu', cursive;
    font-size: 1.25rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 1px;
  }
  .retry-btn:hover { background: #22703f; transform: scale(1.04); }

  /* ── 제출 버튼 ── */
  .submit-wrap {
    max-width: 680px;
    margin: 28px auto 0;
    padding: 0 20px;
    text-align: center;
  }
  .submit-btn {
    background: var(--yellow);
    color: #1a3a00;
    border: none;
    border-radius: 14px;
    padding: 16px 48px;
    font-family: 'Gaegu', cursive;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 #c9a700, 0 6px 16px rgba(200,160,0,0.2);
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .submit-btn:hover { background: #ffe066; transform: translateY(-2px); }
  .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c9a700; }
</style>

let answered = 0;
let correct = 0;
let submitted = false;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answered = 0; correct = 0; submitted = false;
  updateProgress();

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${i}`;

    const typeBadge = q.type === 'word2def' ? '단어 → 뜻' : '뜻 → 단어';

    let qHTML = `
      <div>
        <span class="q-num">${i + 1}번</span>
        <span class="q-type-badge">${typeBadge}</span>
      </div>
      <div class="q-text">${q.question}</div>
      <div class="options" id="opts-${i}">
    `;

    q.options.forEach((opt, j) => {
      qHTML += `<button class="opt-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})" data-qi="${i}" data-oi="${j}">${opt}</button>`;
    });

    qHTML += `</div>
      <div class="feedback" id="fb-${i}"></div>
    `;

    card.innerHTML = qHTML;
    container.appendChild(card);
  });

  document.getElementById('result-section').style.display = 'none';
  document.querySelector('.submit-wrap').style.display = 'block';
}

function selectAnswer(qi, oi) {
  if (submitted) return;
  const q = questions[qi];

  // 모든 버튼 outline 초기화
  q.options.forEach((_, j) => {
    const b = document.getElementById(`opt-${qi}-${j}`);
    b.style.outline = '';
    b.style.background = '';
  });

  // 같은 버튼 다시 누르면 선택 해제
  if (q._selected === oi) {
    q._selected = undefined;
    updateProgress();
    return;
  }

  // 새로운 선택
  const btn = document.getElementById(`opt-${qi}-${oi}`);
  btn.style.outline = '3px solid #2e8b57';
  btn.style.background = '#c5f0d8';
  q._selected = oi;
  updateProgress();
}

function submitAll() {
  if (submitted) return;
  submitted = true;
  answered = 0; correct = 0;

  questions.forEach((q, i) => {
    const sel = q._selected;
    const card = document.getElementById(`card-${i}`);
    const fb = document.getElementById(`fb-${i}`);

    // disable all buttons
    q.options.forEach((_, j) => {
      const btn = document.getElementById(`opt-${i}-${j}`);
      btn.disabled = true;
      btn.style.outline = '';
      btn.style.background = '';
    });

    if (sel === undefined || sel === null) {
      // unanswered
      const correctBtn = document.getElementById(`opt-${i}-${q.answer}`);
      correctBtn.classList.add('reveal');
      fb.innerHTML = '⚠️ 풀지 않은 문제입니다. 정답: ' + q.options[q.answer];
      fb.className = 'feedback show no';
      card.classList.add('answered-wrong');
    } else {
      answered++;
      const selBtn = document.getElementById(`opt-${i}-${sel}`);
      if (sel === q.answer) {
        correct++;
        selBtn.classList.add('correct');
        fb.innerHTML = '✅ 정답입니다! 잘했어요!';
        fb.className = 'feedback show ok';
        card.classList.add('answered-correct');
      } else {
        selBtn.classList.add('wrong');
        const correctBtn = document.getElementById(`opt-${i}-${q.answer}`);
        correctBtn.classList.add('reveal');
        fb.innerHTML = '❌ 틀렸어요. 정답: ' + q.options[q.answer];
        fb.className = 'feedback show no';
        card.classList.add('answered-wrong');
      }
    }
  });

  updateProgress();
  showResult();
  document.querySelector('.submit-wrap').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showResult() {
  const pct = Math.round((correct / questions.length) * 100);
  document.getElementById('res-score').textContent = `${correct} / ${questions.length}점 (${pct}%)`;

  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 3단원 어휘 마스터!<br>발표도 질문도 자신 있겠는데요?'; }
  else if (pct >= 75) { emoji = '🌟'; msg = '아주 잘했어요! 조금만 더 복습하면 완벽!'; }
  else if (pct >= 60) { emoji = '🌱'; msg = '잘 하고 있어요! 틀린 문제를 다시 한번 봐요.'; }
  else { emoji = '📖'; msg = '교과서를 다시 읽고 도전해 봐요. 할 수 있어요!'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-msg').innerHTML = msg;
}

function updateProgress() {
  const c = questions.filter(q => q._selected !== undefined && q._selected !== null).length;
  const pct = (c / questions.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${c} / ${questions.length}`;
  document.getElementById('score-badge').textContent = `맞은 것: ${correct}`;
}

function retryAll() {
  questions.forEach(q => { q._selected = undefined; });
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// init
buildQuiz();

// update progress on select
document.addEventListener('click', e => {
  if (e.target.classList.contains('opt-btn') && !submitted) {
    setTimeout(updateProgress, 10);
  }
});
