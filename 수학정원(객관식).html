<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수학정원 통합 개선안</title>
  <style>
    :root{
      --bg:#f6f8f3;
      --surface:#ffffff;
      --surface-soft:#eef4ea;
      --line:#dbe4d6;
      --text:#243124;
      --sub:#667062;
      --primary:#0a6d23;
      --primary-weak:#e9f7ea;
      --accent:#ac2d5e;
      --accent-weak:#fdebf3;
      --seed:#f8ead1;
      --sprout:#ecf8ed;
      --flower:#fdebf3;
      --fruit:#fff3df;
      --danger:#b84a4a;
      --danger-bg:#fff2f2;
      --good:#216b2b;
      --shadow:0 18px 42px rgba(37,50,34,.08);
      --shadow-soft:0 10px 24px rgba(37,50,34,.06);
      --radius:24px;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f8faf5 0%,#f3f6ee 100%);
      min-height:100vh;
    }
    button,input{font:inherit;}
    button{cursor:pointer;border:0;}
    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:300px minmax(0,1fr);
    }
    .sidebar{
      position:sticky;
      top:0;
      height:100vh;
      padding:24px 18px 22px;
      background:linear-gradient(180deg,#f7faf5 0%,#edf2e9 100%);
      border-right:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      overflow-y:auto;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      font-weight:900;
      font-size:28px;
      color:var(--primary);
      letter-spacing:-.02em;
    }
    .brand-icon,.orb{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:#f1f7ee;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }
    .profile{
      background:rgba(255,255,255,.78);
      border:1px solid var(--line);
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow-soft);
      margin-bottom:16px;
    }
    .profile-head{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:12px;
    }
    .orb{
      width:64px;
      height:64px;
      border-radius:999px;
      font-size:28px;
    }
    .profile-name{
      font-size:20px;
      font-weight:900;
      margin-bottom:4px;
    }
    .profile-sub{
      color:var(--sub);
      font-size:13px;
      font-weight:700;
    }
    .field{
      display:grid;
      gap:6px;
      margin-bottom:10px;
    }
    .field label{
      font-size:13px;
      color:var(--sub);
      font-weight:800;
    }
    .field input{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid #d0d8cb;
      background:#fff;
      color:var(--text);
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 16px;
      border-radius:16px;
      font-weight:800;
      transition:.18s ease;
    }
    .btn:hover{transform:translateY(-1px);}
    .btn-primary{
      color:#fff;
      background:linear-gradient(135deg,var(--primary),#2b913d);
      box-shadow:0 10px 22px rgba(10,109,35,.18);
    }
    .btn-secondary{
      color:#21562a;
      background:#eef5ec;
      border:1px solid #d7e3d1;
    }
    .btn-danger{
      color:var(--danger);
      background:var(--danger-bg);
      border:1px solid #efd2d2;
    }
    .nav{
      display:grid;
      gap:10px;
      margin:16px 0;
    }
    .nav button{
      width:100%;
      text-align:left;
      padding:14px 16px;
      border-radius:18px;
      background:transparent;
      color:var(--text);
      font-weight:800;
      border:1px solid transparent;
    }
    .nav button.active{
      background:var(--primary-weak);
      border-color:#bee2c0;
      color:#184e20;
    }
    .panel{
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:100vh;
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.84);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
      padding:16px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .topbar-title{
      font-size:26px;
      font-weight:900;
      letter-spacing:-.03em;
    }
    .topbar-sub{
      color:var(--sub);
      font-size:13px;
      font-weight:700;
      margin-top:4px;
    }
    .content{
      padding:24px;
      width:100%;
      max-width:1500px;
      margin:0 auto;
      flex:1;
    }
    .screen{display:none;}
    .screen.active{display:block;}
    .hero{
      background:linear-gradient(135deg,#ffffff 0%,#f3f8ef 100%);
      border:1px solid var(--line);
      border-radius:32px;
      padding:26px;
      box-shadow:var(--shadow);
      display:grid;
      grid-template-columns:minmax(0,1.4fr) minmax(280px,420px);
      gap:20px;
      margin-bottom:24px;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#eef6ea;
      color:var(--primary);
      font-size:12px;
      font-weight:900;
      margin-bottom:14px;
    }
    .hero h1,.hero h2,.hero h3,.hero p{margin:0;}
    .hero-title{
      font-size:clamp(34px,4vw,50px);
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.04em;
      margin-bottom:10px;
    }
    .hero-desc{
      color:var(--sub);
      font-size:17px;
      line-height:1.72;
    }
    .hero-side{
      background:#fff;
      border:1px solid var(--line);
      border-radius:26px;
      padding:20px;
      box-shadow:var(--shadow-soft);
      display:grid;
      gap:14px;
      align-content:start;
    }
    .stat-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin-bottom:24px;
    }
    .stat{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow-soft);
    }
    .stat-label{
      font-size:13px;
      color:var(--sub);
      font-weight:800;
      margin-bottom:8px;
    }
    .stat-value{
      font-size:30px;
      font-weight:900;
      letter-spacing:-.03em;
    }
    .card-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }
    .unit-card,.stage-card,.reward-card,.white-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      padding:20px;
      box-shadow:var(--shadow-soft);
    }
    .unit-card{
      display:grid;
      gap:14px;
      min-height:265px;
    }
    .unit-top,.stage-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid var(--line);
      background:#f7faf5;
    }
    .stage-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:64px;
      height:34px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      padding:0 12px;
    }
    .seed{background:var(--seed);}
    .sprout{background:var(--sprout);}
    .flower{background:var(--flower);}
    .fruit{background:var(--fruit);}
    .muted{
      color:var(--sub);
    }
    .unit-title,.section-title{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.02em;
      margin:0 0 6px;
    }
    .unit-desc,.section-desc{
      color:var(--sub);
      line-height:1.68;
      margin:0;
    }
    .progress-wrap{
      width:100%;
      height:12px;
      border-radius:999px;
      border:1px solid #dbe4d7;
      background:#edf3ea;
      overflow:hidden;
    }
    .progress-fill{
      width:0;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#82d783,#2e953f);
      transition:width .25s ease;
    }
    .unit-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      color:var(--sub);
      font-size:13px;
      font-weight:800;
    }
    .stage-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
    }
    .stage-card{
      min-height:240px;
      display:grid;
      gap:14px;
      align-content:start;
    }
    .stage-emoji{
      width:64px;
      height:64px;
      border-radius:22px;
      display:grid;
      place-items:center;
      font-size:30px;
      border:1px solid var(--line);
      background:#fafcf9;
    }
    .stage-card.locked{
      opacity:.7;
      background:#f7faf5;
    }
    .stage-card.completed{
      outline:3px solid #92d595;
      outline-offset:-3px;
    }
    .question-list{
      display:grid;
      gap:14px;
    }
    .question-card{
      border:1px solid #dce5d8;
      border-radius:22px;
      padding:18px;
      background:#fff;
      box-shadow:var(--shadow-soft);
    }
    .question-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .question-title{
      font-size:18px;
      font-weight:900;
      line-height:1.55;
    }
    .question-sub{
      color:var(--sub);
      font-size:13px;
      font-weight:800;
    }
    .choices{
      display:grid;
      gap:10px;
    }
    .choice{
      border:1px solid #dbe2d7;
      border-radius:16px;
      padding:12px 14px;
      background:#fff;
      text-align:left;
      transition:.16s ease;
      font-weight:700;
      line-height:1.55;
    }
    .choice:hover{
      background:#f8fbf6;
      border-color:#cdd7c8;
    }
    .choice.selected{
      background:#eff8ee;
      border-color:#7fc482;
      color:#184d21;
    }
    .choice.wrong{
      background:#fff4f4;
      border-color:#efcaca;
      color:#9f4343;
    }
    .choice.correct{
      background:#eef9ef;
      border-color:#8bd18f;
      color:#185021;
      pointer-events:none;
    }
    .feedback{
      display:none;
      margin-top:12px;
      padding:12px 14px;
      border-radius:16px;
      line-height:1.68;
      font-size:14px;
    }
    .feedback.show{display:block;}
    .feedback.good{
      background:#eef9ef;
      border:1px solid #cde7d0;
      color:var(--good);
    }
    .feedback.bad{
      background:#fff3f3;
      border:1px solid #efcccc;
      color:#a14545;
    }
    .feedback.info{
      background:#f6f8f4;
      border:1px solid #dde4d9;
      color:#556258;
    }
    .section-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px;
      box-shadow:var(--shadow);
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      margin-top:18px;
    }
    .reward-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
    }
    .reward-card{
      min-height:200px;
      display:grid;
      gap:10px;
      align-content:start;
    }
    .fruit-big{
      font-size:42px;
      line-height:1;
    }
    .notice{
      padding:14px 16px;
      border-radius:18px;
      background:#f6f9f3;
      border:1px solid var(--line);
      color:var(--sub);
      line-height:1.65;
      font-size:14px;
    }
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(22,29,22,.45);
      backdrop-filter:blur(4px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
      padding:18px;
    }
    .overlay.show{display:flex;}
    .modal{
      max-width:460px;
      width:100%;
      background:#fff;
      border-radius:32px;
      border:1px solid var(--line);
      box-shadow:0 24px 60px rgba(0,0,0,.16);
      padding:28px;
      text-align:center;
    }
    .modal-emoji{
      font-size:68px;
      line-height:1;
      margin-bottom:14px;
    }
    .modal h3{
      margin:0 0 10px;
      font-size:30px;
      font-weight:900;
      letter-spacing:-.03em;
    }
    .modal p{
      margin:0;
      color:var(--sub);
      line-height:1.72;
    }
    .meta-chips{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:14px 0 0;
    }
    .meta-chips span{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#f7faf5;
      border:1px solid var(--line);
      font-size:13px;
      color:var(--sub);
      font-weight:800;
    }
    .paper{
      background:
        linear-gradient(#fff,#fff) padding-box,
        linear-gradient(135deg,#ffffff,#edf3ea) border-box;
      border:1px solid transparent;
      border-radius:30px;
      padding:24px;
      box-shadow:var(--shadow);
    }
    .math-inline{
      display:inline-flex;
      align-items:center;
      gap:.08em;
      flex-wrap:wrap;
    }
    .frac{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1;
      margin:0 .08em;
      min-width:1.5em;
      vertical-align:middle;
    }
    .frac .top{
      display:block;
      padding:0 .18em .08em;
      border-bottom:1.7px solid currentColor;
      font-size:.92em;
      font-weight:700;
    }
    .frac .bottom{
      display:block;
      padding:.08em .18em 0;
      font-size:.92em;
      font-weight:700;
    }
    .mobile-nav{
      display:none;
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:25;
      padding:12px 16px calc(12px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-top:1px solid var(--line);
      gap:10px;
    }
    .mobile-nav button{
      flex:1;
      padding:12px 10px;
      border-radius:18px;
      font-size:12px;
      font-weight:900;
      background:#f2f6ef;
      color:#52604f;
    }
    .mobile-nav button.active{
      background:var(--primary-weak);
      color:#1d5626;
    }
    @media (max-width:1200px){
      .card-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .reward-grid{grid-template-columns:repeat(3,minmax(0,1fr));}
      .stage-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .stat-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .hero{grid-template-columns:1fr;}
    }
    @media (max-width:860px){
      .app{grid-template-columns:1fr;}
      .sidebar{
        display:none;
      }
      .topbar{padding:16px 18px;}
      .content{padding:18px 18px 92px;}
      .card-grid,.reward-grid,.summary-grid,.stage-grid,.stat-grid{
        grid-template-columns:1fr;
      }
      .mobile-nav{display:flex;}
      .topbar-title{font-size:22px;}
      .hero-title{font-size:34px;}
      .paper,.section-card,.unit-card,.stage-card,.reward-card,.stat{padding:18px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="brand-icon">🌿</div><span>수학 정원</span></div>

      <section class="profile">
        <div class="profile-head">
          <div class="orb">🪴</div>
          <div>
            <div id="profileName" class="profile-name">정원사</div>
            <div id="profileSub" class="profile-sub">5학년 1학기 성장 기록</div>
          </div>
        </div>
        <div class="field">
          <label for="studentName">이름</label>
          <input id="studentName" placeholder="예: 홍길동" />
        </div>
        <div class="field">
          <label for="studentClass">반 / 번호</label>
          <input id="studentClass" placeholder="예: 5-1 / 12번" />
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="saveStudentInfo()">학생 정보 저장</button>
      </section>

      <nav class="nav">
        <button id="nav-units" onclick="goScreen('units')">🏡 내 정원</button>
        <button id="nav-stages" onclick="goScreen('stages')">🌱 성장 단계</button>
        <button id="nav-rewards" onclick="goScreen('rewards')">🏆 나의 보상</button>
      </nav>

      <section class="profile">
        <div class="section-title" style="font-size:18px;">교사용 관리</div>
        <p class="section-desc" style="font-size:14px;margin-bottom:14px;">현재 단원 기록만 지우거나 전체 기록을 초기화할 수 있습니다.</p>
        <div class="toolbar">
          <button class="btn btn-secondary" style="width:100%;" onclick="resetCurrentUnit()">현재 단원 초기화</button>
          <button class="btn btn-danger" style="width:100%;" onclick="resetAllData()">전체 기록 초기화</button>
        </div>
      </section>

      <section class="notice">
        자동저장형 구조입니다. 정답/오답, 오답 횟수, 단계 완료 여부가 같은 브라우저에 저장됩니다.
      </section>
    </aside>

    <section class="panel">
      <header class="topbar">
        <div>
          <div id="topbarTitle" class="topbar-title">5학년 1학기 수학 정원</div>
          <div id="topbarSub" class="topbar-sub">오프라인 저장 + 앱형 화면 전환을 합친 통합 개선안</div>
        </div>
        <div class="badge">💾 자동 저장</div>
      </header>

      <main class="content">
        <section id="screen-units" class="screen active"></section>
        <section id="screen-stages" class="screen"></section>
        <section id="screen-quiz" class="screen"></section>
        <section id="screen-rewards" class="screen"></section>
      </main>
    </section>
  </div>

  <nav class="mobile-nav">
    <button id="mnav-units" onclick="goScreen('units')">🏡 정원</button>
    <button id="mnav-stages" onclick="goScreen('stages')">🌱 단계</button>
    <button id="mnav-rewards" onclick="goScreen('rewards')">🏆 보상</button>
  </nav>

  <div id="stageModal" class="overlay" onclick="closeModal(event)">
    <div class="modal">
      <div id="modalEmoji" class="modal-emoji">🌱</div>
      <h3 id="modalTitle">단계 완료!</h3>
      <p id="modalText">다음 단계가 열렸어요.</p>
      <div class="meta-chips" style="justify-content:center;">
        <span id="modalChip">성장 완료</span>
      </div>
      <div class="toolbar" style="justify-content:center;margin-top:20px;">
        <button class="btn btn-primary" onclick="hideStageModal()">확인</button>
      </div>
    </div>
  </div>

  <script>
    function q(stage, prompt, choices, answer, explanation) {
      return { stage: stage, prompt: prompt, choices: choices, answer: answer, explanation: explanation };
    }

    const units = [
      {
        id: 1,
        title: '자연수의 혼합 계산',
        theme: '연산 정원',
        questions: [
          q('씨앗','덧셈과 뺄셈이 섞여 있는 식은 어떻게 계산해야 할까요?',['앞에서부터 차례대로','뒤에서부터 차례대로','큰 수부터 먼저','덧셈 먼저'],0,'덧셈과 뺄셈만 섞여 있으면 앞에서부터 차례대로 계산합니다.'),
          q('씨앗','18 - 7 + 5의 값은 얼마일까요?',['11','16','20','6'],1,'18-7=11, 11+5=16입니다.'),

    const STAGE_ORDER = ['씨앗', '새싹', '꽃'];

      '씨앗': { emoji: '🌰', cls: 'seed', title: '씨앗 단계', desc: '기초 8문제를 해결합니다.' },
      '새싹': { emoji: '🌱', cls: 'sprout', title: '새싹 단계', desc: '씨앗을 완성하면 열리는 기본 문제입니다.' },
      '꽃': { emoji: '🌸', cls: 'flower', title: '꽃 단계', desc: '문장제가 포함된 심화 단계입니다.' },
      '열매': { emoji: '🍎', cls: 'fruit', title: '열매', desc: '씨앗·새싹·꽃을 모두 완성하면 열매가 맺힙니다.' }
    };

    let state = loadState();

    function createDefaultState() {
      return {
        student: { name: '', classInfo: '' },
        currentScreen: 'units',
        currentUnitId: units[0].id,
        currentStage: '씨앗',
        progress: {}
      };
    }

    function createUnitProgress() {
      return {
        answered: {},
        attempts: {},
        correctCount: 0,
        totalCount: 0,
        completedStages: []
      };
    }

    function loadState() {
      const defaults = createDefaultState();
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : defaults;
        const merged = {
          ...defaults,
          ...parsed,
          student: { ...defaults.student, ...(parsed.student || {}) },
          progress: parsed.progress || {}
        };
        units.forEach(unit => {
          if (!merged.progress[unit.id]) merged.progress[unit.id] = createUnitProgress();
        });
        return merged;
      } catch (e) {
        return defaults;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function ensureUnitState(unitId) {
      if (!state.progress[unitId]) {
        state.progress[unitId] = createUnitProgress();
      }
    }

    function getUnitById(unitId) {
      return units.find(unit => unit.id === unitId) || units[0];
    }

    function getCurrentUnit() {
      return getUnitById(state.currentUnitId);
    }

    function getStageQuestions(unit, stageName) {
      return unit.questions
        .map((question, index) => ({ ...question, index }))
        .filter(question => question.stage === stageName);
    }

    function recomputeCounts(unitId) {
      const unit = getUnitById(unitId);
      const unitState = state.progress[unitId];
      let correct = 0;
      Object.keys(unitState.answered).forEach(key => {
        const idx = Number(key);
        if (unit.questions[idx] && unitState.answered[idx] === unit.questions[idx].answer) {
          correct += 1;
        }
      });
      unitState.correctCount = correct;
      unitState.totalCount = unit.questions.length;
    }

    function updateCompletedStages(unitId) {
      const unit = getUnitById(unitId);
      const unitState = state.progress[unitId];
      const completed = [];

      STAGE_ORDER.forEach(stageName => {
        const items = getStageQuestions(unit, stageName);
        if (!items.length) return;
        const done = items.every(item => unitState.answered[item.index] === item.answer);
        if (done) completed.push(stageName);
      });

      if (completed.includes('씨앗') && completed.includes('새싹') && completed.includes('꽃')) {
        completed.push('열매');
      }

      unitState.completedStages = completed;
    }

    function isStageUnlocked(unitId, stageName) {
      ensureUnitState(unitId);
      const completed = state.progress[unitId].completedStages;
      if (stageName === '씨앗') return true;
      if (stageName === '새싹') return completed.includes('씨앗');
      if (stageName === '꽃') return completed.includes('새싹');
      if (stageName === '열매') return completed.includes('꽃');
      return false;
    }

    function getStageStats(unitId, stageName) {
      ensureUnitState(unitId);
      const unit = getUnitById(unitId);
      const unitState = state.progress[unitId];
      const items = getStageQuestions(unit, stageName);
      const total = items.length;
      const solved = items.filter(item => unitState.answered[item.index] !== undefined).length;
      const correct = items.filter(item => unitState.answered[item.index] === item.answer).length;
      return {
        total,
        solved,
        correct,
        completed: unitState.completedStages.includes(stageName)
      };
    }

    function getUnitStats(unitId) {
      ensureUnitState(unitId);
      const unit = getUnitById(unitId);
      const unitState = state.progress[unitId];
      const total = unit.questions.length;
      const solved = Object.keys(unitState.answered).length;
      const correct = unitState.correctCount;
      const progressPercent = total ? Math.round((correct / total) * 100) : 0;
      return {
        total,
        solved,
        correct,
        progressPercent,
        fruits: unitState.completedStages.includes('열매')
      };
    }

    function getOverallStats() {
      let solved = 0;
      let correct = 0;
      let fruits = 0;
      let stages = 0;

      units.forEach(unit => {
        ensureUnitState(unit.id);
        const s = getUnitStats(unit.id);
        solved += s.solved;
        correct += s.correct;
        if (s.fruits) fruits += 1;
        stages += state.progress[unit.id].completedStages.filter(stage => stage !== '열매').length;
      });

      return {
        unitCount: units.length,
        solved,
        correct,
        fruits,
        stages
      };
    }

    function getGrowthMessage(unitId) {
      ensureUnitState(unitId);
      const done = state.progress[unitId].completedStages;
      if (done.includes('열매')) return '씨앗, 새싹, 꽃을 모두 해결해 열매가 맺혔어요!';
      if (done.includes('꽃')) return '꽃 단계까지 완성했어요. 이제 열매가 맺힙니다.';
      if (done.includes('새싹')) return '새싹까지 자랐어요. 꽃 문제에 도전해 보세요.';
      if (done.includes('씨앗')) return '씨앗이 자라 새싹 단계가 열렸어요.';
      return '씨앗 단계부터 차근차근 시작해 보세요.';
    }

    function saveStudentInfo() {
      state.student.name = document.getElementById('studentName').value.trim();
      state.student.classInfo = document.getElementById('studentClass').value.trim();
      saveState();
      render();
    }

    function goScreen(screen) {
      state.currentScreen = screen;
      saveState();
      render();
    }

    function selectUnit(unitId) {
      state.currentUnitId = unitId;
      state.currentScreen = 'stages';
      saveState();
      render();
    }

    function openStage(stageName) {
      if (!isStageUnlocked(state.currentUnitId, stageName)) return;
      state.currentStage = stageName;
      state.currentScreen = 'quiz';
      saveState();
      render();
    }

    function answerQuestion(unitId, questionIndex, choiceIndex) {
      ensureUnitState(unitId);
      const unit = getUnitById(unitId);
      const question = unit.questions[questionIndex];
      const unitState = state.progress[unitId];
      const beforeCompleted = new Set(unitState.completedStages);

      if (unitState.answered[questionIndex] === question.answer) return;

      unitState.answered[questionIndex] = choiceIndex;

      if (choiceIndex !== question.answer) {
        unitState.attempts[questionIndex] = (unitState.attempts[questionIndex] || 0) + 1;
      }

      recomputeCounts(unitId);
      updateCompletedStages(unitId);
      saveState();
      render();

      const afterCompleted = state.progress[unitId].completedStages;
      const newlyCompleted = afterCompleted.find(stage => !beforeCompleted.has(stage) && stage !== '열매');
      if (newlyCompleted) {
        showStageModal(newlyCompleted);
      } else if (!beforeCompleted.has('열매') && afterCompleted.includes('열매')) {
        showStageModal('열매');
      }
    }

    function resetCurrentUnit() {
      const unit = getCurrentUnit();
      if (!confirm('현재 단원의 기록만 초기화할까요?')) return;
      state.progress[unit.id] = createUnitProgress();
      saveState();
      render();
    }

    function resetAllData() {
      if (!confirm('전체 학습 기록을 모두 초기화할까요?')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = createDefaultState();
      units.forEach(unit => {
        state.progress[unit.id] = createUnitProgress();
      });
      render();
    }

    function showStageModal(stageName) {
      const unit = getCurrentUnit();
      const meta = STAGE_META[stageName];
      document.getElementById('modalEmoji').textContent = meta.emoji;
      document.getElementById('modalTitle').textContent = stageName === '열매' ? '열매 완성!' : `${meta.title} 완료!`;
      document.getElementById('modalText').textContent = stageName === '열매'
        ? `${unit.title} 단원의 모든 성장을 끝냈어요. 정말 대단합니다!`
        : `${unit.title}의 ${meta.title}를 모두 맞혀 다음 성장 단계가 열렸어요.`;
      document.getElementById('modalChip').textContent = stageName === '열매' ? '단원 완성' : '성장 완료';
      document.getElementById('stageModal').classList.add('show');
    }

    function hideStageModal() {
      document.getElementById('stageModal').classList.remove('show');
    }

    function closeModal(event) {
      if (event.target.id === 'stageModal') hideStageModal();
    }

    function formatMathText(text) {
      const source = String(text);
      let out = '';
      let i = 0;
      while (i < source.length) {
        const ch = source[i];
        const digit = ch >= '0' && ch <= '9';
        if (digit) {
          let j = i;
          while (j < source.length && source[j] >= '0' && source[j] <= '9') j += 1;
          const top = source.slice(i, j);
          if (j < source.length && source[j] === '/') {
            let k = j + 1;
            while (k < source.length && source[k] >= '0' && source[k] <= '9') k += 1;
            if (k > j + 1) {
              const bottom = source.slice(j + 1, k);
              out += '<span class="frac"><span class="top">' + escapeHtml(top) + '</span><span class="bottom">' + escapeHtml(bottom) + '</span></span>';
              i = k;
              continue;
            }
          }
          out += escapeHtml(top);
          i = j;
          continue;
        }
        out += escapeHtml(ch);
        i += 1;
      }
      return '<span class="math-inline">' + out + '</span>';
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderUnitsScreen() {
      const overall = getOverallStats();
      const currentStats = getUnitStats(state.currentUnitId);
      const html = `
        <div class="hero">
          <div>
            <div class="eyebrow">🌱 자동저장형 + 앱형 UX 통합본</div>
            <div class="hero-title">5학년 1학기 수학 정원</div>
            <p class="hero-desc">5학년 1학기를 복습합니다.</p>
          </div>
          <div class="hero-side">
            <div>
              <div class="stat-label">현재 단원 진행률</div>
              <div class="stat-value">${currentStats.correct}/${currentStats.total}</div>
            </div>
            <div class="progress-wrap"><div class="progress-fill" style="width:${currentStats.progressPercent}%"></div></div>
            <div class="notice">${getGrowthMessage(state.currentUnitId)}</div>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat"><div class="stat-label">완료한 열매</div><div class="stat-value">${overall.fruits}</div></div>
          <div class="stat"><div class="stat-label">완료한 단계</div><div class="stat-value">${overall.stages}</div></div>
          <div class="stat"><div class="stat-label">정답 수</div><div class="stat-value">${overall.correct}</div></div>
          <div class="stat"><div class="stat-label">응답한 문제</div><div class="stat-value">${overall.solved}</div></div>
        </div>

        <div class="card-grid">
          ${units.map(unit => {
            const stats = getUnitStats(unit.id);
            const active = unit.id === state.currentUnitId;
            return `
              <article class="unit-card">
                <div class="unit-top">
                  <div>
                    <div class="badge">${active ? '현재 선택 단원' : '단원 카드'}</div>
                    <h3 class="unit-title" style="margin-top:12px;">${unit.id}. ${unit.title}</h3>
                    <p class="unit-desc">${unit.theme} · ${getGrowthMessage(unit.id)}</p>
                  </div>
                  <div class="stage-pill ${stats.fruits ? 'fruit' : 'sprout'}">${stats.fruits ? '열매' : '성장중'}</div>
                </div>
                <div class="unit-meta"><span>정답 ${stats.correct}/${stats.total}</span><span>${stats.progressPercent}%</span></div>
                <div class="progress-wrap"><div class="progress-fill" style="width:${stats.progressPercent}%"></div></div>
                <div class="toolbar" style="margin-top:auto;">
                  <button class="btn ${active ? 'btn-secondary' : 'btn-primary'}" onclick="selectUnit(${unit.id})" style="flex:1;">${active ? '이 단원 보기' : '단원 선택'}</button>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;
      document.getElementById('screen-units').innerHTML = html;
    }

    function renderStagesScreen() {
      const unit = getCurrentUnit();
      const unitState = state.progress[unit.id];
      const stats = getUnitStats(unit.id);
      const html = `
        <div class="hero">
          <div>
            <div class="eyebrow">🌿 ${unit.theme}</div>
            <div class="hero-title">${unit.id}. ${unit.title}</div>
            <p class="hero-desc">${getGrowthMessage(unit.id)}</p>
            <div class="meta-chips">
              <span>총 ${unit.questions.length}문항</span>
              <span>정답 ${stats.correct}개</span>
              <span>완료 단계 ${unitState.completedStages.filter(stage => stage !== '열매').length}개</span>
            </div>
          </div>
          <div class="hero-side">
            <div class="stat-label">단원 전체 성장률</div>
            <div class="stat-value">${stats.correct}/${stats.total}</div>
            <div class="progress-wrap"><div class="progress-fill" style="width:${stats.progressPercent}%"></div></div>
            <button class="btn btn-secondary" onclick="goScreen('units')">단원 카드로 돌아가기</button>
          </div>
        </div>

        <div class="stage-grid">
          ${STAGE_ORDER.map(stageName => {
            const stageStats = getStageStats(unit.id, stageName);
            const meta = STAGE_META[stageName];
            const unlocked = isStageUnlocked(unit.id, stageName);
            const active = state.currentStage === stageName;
            return `
              <article class="stage-card ${stageStats.completed ? 'completed' : ''} ${unlocked ? '' : 'locked'}">
                <div class="stage-top">
                  <div class="stage-emoji ${meta.cls}">${meta.emoji}</div>
                  <div class="stage-pill ${meta.cls}">${stageName}</div>
                </div>
                <div>
                  <h3 class="unit-title">${meta.title}</h3>
                  <p class="unit-desc">${meta.desc}</p>
                </div>
                <div class="unit-meta"><span>정답 ${stageStats.correct}/${stageStats.total}</span><span>${Math.round((stageStats.correct / Math.max(1, stageStats.total)) * 100)}%</span></div>
                <div class="progress-wrap"><div class="progress-fill" style="width:${Math.round((stageStats.correct / Math.max(1, stageStats.total)) * 100)}%"></div></div>
                <button class="btn ${unlocked ? (active ? 'btn-secondary' : 'btn-primary') : 'btn-secondary'}" onclick="${unlocked ? `openStage('${stageName}')` : 'void(0)'}" style="margin-top:auto;">
                  ${stageStats.completed ? '다시 보기' : unlocked ? '이 단계 학습하기' : '이전 단계 필요'}
                </button>
              </article>
            `;
          }).join('')}

          <article class="stage-card ${unitState.completedStages.includes('열매') ? 'completed' : ''}">
            <div class="stage-top">
              <div class="stage-emoji fruit">🍎</div>
              <div class="stage-pill fruit">열매</div>
            </div>
            <div>
              <h3 class="unit-title">최종 열매</h3>
              <p class="unit-desc">씨앗·새싹·꽃을 모두 맞히면 열매가 자동으로 완성됩니다.</p>
            </div>
            <div class="notice">${unitState.completedStages.includes('열매') ? '축하합니다! 이 단원의 열매를 얻었어요.' : '아직 꽃 단계까지 모두 완료되지 않았어요.'}</div>
          </article>
        </div>
      `;
      document.getElementById('screen-stages').innerHTML = html;
    }

    function renderQuizScreen() {
      const unit = getCurrentUnit();
      const stageName = state.currentStage;
      const meta = STAGE_META[stageName];
      const stageStats = getStageStats(unit.id, stageName);
      const items = getStageQuestions(unit, stageName);
      const unitState = state.progress[unit.id];

      const html = `
        <div class="paper">
          <div class="hero" style="margin-bottom:18px;">
            <div>
              <div class="eyebrow">${meta.emoji} ${meta.title}</div>
              <div class="hero-title">${unit.id}. ${unit.title}</div>
              <p class="hero-desc">${meta.desc} · 문제를 세 번 틀리면 해설이 열립니다.</p>
              <div class="meta-chips">
                <span>정답 ${stageStats.correct}/${stageStats.total}</span>
                <span>응답 ${stageStats.solved}/${stageStats.total}</span>
                <span>${stageStats.completed ? '단계 완료' : '도전 중'}</span>
              </div>
            </div>
            <div class="hero-side">
              <div class="stat-label">현재 단계 진도</div>
              <div class="stat-value">${stageStats.correct}/${stageStats.total}</div>
              <div class="progress-wrap"><div class="progress-fill" style="width:${Math.round((stageStats.correct / Math.max(1, stageStats.total)) * 100)}%"></div></div>
              <div class="toolbar">
                <button class="btn btn-secondary" onclick="goScreen('stages')">단계 화면으로</button>
                <button class="btn btn-secondary" onclick="goScreen('rewards')">보상 보기</button>
              </div>
            </div>
          </div>

          <div class="question-list">
            ${items.map((item, no) => {
              const selected = unitState.answered[item.index];
              const attempts = unitState.attempts[item.index] || 0;
              const isCorrect = selected === item.answer;
              const showExplanation = attempts >= 3;
              return `
                <article class="question-card">
                  <div class="question-head">
                    <div>
                      <div class="badge">${stageName} ${no + 1}번</div>
                      <div class="question-title" style="margin-top:10px;">${formatMathText(item.prompt)}</div>
                    </div>
                    <div class="question-sub">${isCorrect ? '정답 완료' : attempts > 0 ? `오답 ${attempts}회` : '도전 전'}</div>
                  </div>
                  <div class="choices">
                    ${item.choices.map((choice, choiceIndex) => {
                      const klass = isCorrect
                        ? (choiceIndex === item.answer ? 'choice correct' : 'choice')
                        : (selected === choiceIndex ? 'choice wrong' : 'choice');
                      return `<button class="${klass}" onclick="answerQuestion(${unit.id}, ${item.index}, ${choiceIndex})">${formatMathText(choice)}</button>`;
                    }).join('')}
                  </div>
                  <div class="feedback ${isCorrect ? 'good show' : selected !== undefined ? 'bad show' : ''}">
                    ${isCorrect ? '정답입니다. 잘 해결했어요!' : selected !== undefined ? '조금 아쉬워요. 다시 생각해 보고 다른 선택지를 눌러 보세요.' : ''}
                  </div>
                  <div class="feedback info ${showExplanation ? 'show' : ''}">
                    <strong>해설</strong><br>${formatMathText(item.explanation)}
                  </div>
                </article>
              `;
            }).join('')}
          </div>
        </div>
      `;
      document.getElementById('screen-quiz').innerHTML = html;
    }

    function renderRewardsScreen() {
      const overall = getOverallStats();
      const html = `
        <div class="hero">
          <div>
            <div class="eyebrow">🏆 성장 보상</div>
            <div class="hero-title">나의 수학 정원 결실</div>
            <p class="hero-desc">완성한 단계와 열매를 한눈에 모아보는 화면입니다. 수업 시간에는 이 화면으로 학습 성취를 빠르게 확인할 수 있습니다.</p>
          </div>
          <div class="hero-side">
            <div class="stat-label">획득한 열매</div>
            <div class="stat-value">${overall.fruits}/${units.length}</div>
            <div class="progress-wrap"><div class="progress-fill" style="width:${Math.round((overall.fruits / Math.max(1, units.length)) * 100)}%"></div></div>
            <div class="notice">열매는 한 단원의 씨앗, 새싹, 꽃을 모두 완성했을 때 자동으로 획득됩니다.</div>
          </div>
        </div>

        <div class="summary-grid">
          <div class="white-card">
            <div class="stat-label">전체 성장 요약</div>
            <div class="stat-value">${overall.correct}</div>
            <p class="unit-desc">지금까지 맞힌 문제 수</p>
          </div>
          <div class="white-card">
            <div class="stat-label">완료한 학습 단계</div>
            <div class="stat-value">${overall.stages}</div>
            <p class="unit-desc">씨앗·새싹·꽃 완료 개수</p>
          </div>
        </div>

        <div class="reward-grid" style="margin-top:18px;">
          ${units.map(unit => {
            const unitState = state.progress[unit.id];
            const fruit = unitState.completedStages.includes('열매');
            return `
              <article class="reward-card">
                <div class="fruit-big">${fruit ? '🍎' : '🌿'}</div>
                <h3 class="unit-title" style="font-size:20px;">${unit.id}. ${unit.title}</h3>
                <p class="unit-desc">${fruit ? '열매 획득 완료' : getGrowthMessage(unit.id)}</p>
                <div class="meta-chips">
                  ${STAGE_ORDER.map(stage => `<span>${STAGE_META[stage].emoji} ${unitState.completedStages.includes(stage) ? stage + ' 완료' : stage + ' 진행중'}</span>`).join('')}
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;
      document.getElementById('screen-rewards').innerHTML = html;
    }

    function updateChrome() {
      const titleMap = {
        units: '5학년 1학기 수학 정원',
        stages: `${getCurrentUnit().id}. ${getCurrentUnit().title}`,
        quiz: `${getCurrentUnit().id}. ${getCurrentUnit().title} · ${state.currentStage} 단계`,
        rewards: '나의 수학 정원 보상'
      };
      const subMap = {
        units: '단원 선택과 전체 성장 현황',
        stages: '단계별 학습 진입 화면',
        quiz: '자동저장 + 오답 3회 해설 표시',
        rewards: '열매와 단계 완료 현황'
      };
      document.getElementById('topbarTitle').textContent = titleMap[state.currentScreen] || '수학 정원';
      document.getElementById('topbarSub').textContent = subMap[state.currentScreen] || '';

      ['units','stages','rewards'].forEach(screen => {
        const active = state.currentScreen === screen;
        const nav = document.getElementById(`nav-${screen}`);
        const mnav = document.getElementById(`mnav-${screen}`);
        if (nav) nav.classList.toggle('active', active);
        if (mnav) mnav.classList.toggle('active', active);
      });

      document.getElementById('profileName').textContent = state.student.name || '정원사';
      document.getElementById('profileSub').textContent = state.student.classInfo
        ? `${state.student.classInfo} · 5학년 1학기 성장 기록`
        : '5학년 1학기 성장 기록';
      document.getElementById('studentName').value = state.student.name || '';
      document.getElementById('studentClass').value = state.student.classInfo || '';
    }

    function render() {
      units.forEach(unit => ensureUnitState(unit.id));
      updateChrome();

      document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
      document.getElementById(`screen-${state.currentScreen}`).classList.add('active');

      renderUnitsScreen();
      renderStagesScreen();
      renderQuizScreen();
      renderRewardsScreen();
    }

    units.forEach(unit => ensureUnitState(unit.id));
    recomputeAll();

    function recomputeAll() {
      units.forEach(unit => {
        ensureUnitState(unit.id);
        recomputeCounts(unit.id);
        updateCompletedStages(unit.id);
      });
      saveState();
    }

    render();
  </script>
</body>
</html>
