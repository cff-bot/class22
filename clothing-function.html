];

let cur=0, correct=0, wrong=0, answered=false;

function render(){
  const q=qs[cur];
  document.getElementById('qnum').textContent=`${cur+1} / ${qs.length}`;
  document.getElementById('prog').style.width=`${(cur/qs.length)*100}%`;
  document.getElementById('sco').textContent=`맞음 ${correct}`;
  document.getElementById('scx').textContent=`틀림 ${wrong}`;
  answered=false;
  document.getElementById('qcard').innerHTML=`
    <div class="qsvg">${svgs[q.svg]||''}</div>
    <div class="qtext">${q.q}</div>
    <div class="qhint">${q.h}</div>
    <div class="brow">
      <button class="bc bp" data-ans="protect">🛡️ 보호의 기능</button>
      <button class="bc be" data-ans="express">🎨 표현의 기능</button>
    </div>
    <div class="fb" id="fb"></div>
    <button class="bnext" id="bnext">${cur<qs.length-1?'다음 문제 →':'결과 보기 →'}</button>`;
  document.querySelectorAll('.bc').forEach(b=>b.addEventListener('click',()=>answer(b.dataset.ans)));
  document.getElementById('bnext').addEventListener('click',next);
}

function answer(choice){
  if(answered)return;
  answered=true;
  const q=qs[cur];
  const ok=choice===q.ans;
  if(ok)correct++;else wrong++;
  document.querySelectorAll('.bc').forEach(b=>{
    b.disabled=true;
    if(b.dataset.ans===q.ans)b.classList.add('correct');
    else if(b.dataset.ans===choice)b.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  fb.textContent=(ok?'✓ ':'✗ ')+(ok?q.ok:q.bad);
  fb.className='fb '+(ok?'fbo':'fbx');
  fb.style.display='block';
  document.getElementById('sco').textContent=`맞음 ${correct}`;
  document.getElementById('scx').textContent=`틀림 ${wrong}`;
  document.getElementById('bnext').style.display='block';
}

function next(){
  cur++;
  if(cur>=qs.length){showResult();return;}
  render();
}

function showResult(){
  const pct=Math.round(correct/qs.length*100);
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='완벽해요! 옷의 기능 박사네요!';}
  else if(pct>=70){emoji='👍';msg='잘했어요! 조금 더 연습하면 완벽해요!';}
  else if(pct>=50){emoji='🤔';msg='절반은 맞았어요. 다시 한번 도전해봐요!';}
  else{emoji='📚';msg='교과서를 다시 읽고 재도전해봐요!';}
  document.getElementById('prog').style.width='100%';
  document.getElementById('qcard').innerHTML=`
    <div class="rcrd">
      <div style="font-size:52px;margin-bottom:1rem">${emoji}</div>
      <div class="rscore">${correct} / ${qs.length}</div>
      <div class="rmsg">${msg}</div>
      <div class="rgrid">
        <div class="met"><div class="mlb">정답률</div><div class="mval">${pct}%</div></div>
        <div class="met"><div class="mlb">틀린 문제</div><div class="mval">${wrong}개</div></div>
      </div>
      <button class="retry" id="rtbtn">다시 풀기</button>
    </div>`;
  document.getElementById('rtbtn').addEventListener('click',()=>{cur=0;correct=0;wrong=0;render();});
}

render();
</script>
