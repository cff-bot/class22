        let activeUnitIndex = -1;
        let activeWorksheetIndex = -1;

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                appState = JSON.parse(saved);
                gardenData.forEach(unit => {
                    if (appState.progress[unit.id] !== undefined) {
                        unit.currentLevel = appState.progress[unit.id];
                    }
                });
            } else {
                appState = { studentName: '5학년 학생', progress: {} };
            }
            updateNameDisplay(appState.studentName);
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        function saveProgressLocal(unitId, newLevel) {
            appState.progress[unitId] = newLevel;
            saveState();
        }

        function resetAllData() {
            if (confirm("모든 학습 기록과 이름을 초기화하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function resetCurrentUnit() {
            if (activeUnitIndex === -1) return;
            const unit = gardenData[activeUnitIndex];
            if (confirm(`현재 단원(${unit.title})의 기록을 초기화하시겠습니까?`)) {
                unit.currentLevel = 0;
                saveProgressLocal(unit.id, 0);
                showToast('현재 단원의 기록이 초기화되었습니다.');
                renderStages();
                document.getElementById('main-scroll-area').scrollTop = 0;
            }
        }

        function openNameModal() {
            document.getElementById('name-input').value = appState.studentName === '5학년 학생' ? '' : appState.studentName;
            document.getElementById('name-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('name-input').focus(), 100);
        }

        function closeNameModal() {
            document.getElementById('name-modal').classList.add('hidden');
        }

        function saveName() {
            let newName = document.getElementById('name-input').value.trim();
            if (!newName) newName = '5학년 학생';
            
            appState.studentName = newName;
            saveState();
            updateNameDisplay(newName);
            closeNameModal();
            showToast('학생 정보가 안전하게 저장되었습니다.');
        }

        function updateNameDisplay(name) {
            const profileDisplay = document.getElementById('profile-name-display');
            if (profileDisplay) profileDisplay.innerText = name;
            
            const wsNameFields = document.querySelectorAll('.student-name-field');
            wsNameFields.forEach(el => el.innerText = name);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-stone-800 text-white px-6 py-3 rounded-full shadow-lg z-[100] transition-opacity duration-300 opacity-0 font-label text-sm font-bold whitespace-nowrap';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.remove('opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function navTo(screenId) {
            document.getElementById('screen-units').classList.add('hidden');
            document.getElementById('screen-stages').classList.add('hidden');
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-rewards').classList.add('hidden');

            ['desk', 'mob'].forEach(type => {
                document.getElementById(`nav-units-${type}`).className = type === 'desk' 
                    ? 'w-full flex items-center gap-3 text-stone-600 p-4 hover:bg-stone-200 rounded-2xl transition-all'
                    : 'flex flex-col items-center justify-center text-stone-500 px-5 py-2 hover:bg-emerald-50 rounded-2xl transition-all font-label text-[10px] font-semibold';
                document.getElementById(`nav-stages-${type}`).className = type === 'desk'
                    ? 'w-full flex items-center gap-3 text-stone-600 p-4 hover:bg-stone-200 rounded-2xl transition-all'
                    : 'flex flex-col items-center justify-center text-stone-500 px-5 py-2 hover:bg-emerald-50 rounded-2xl transition-all font-label text-[10px] font-semibold';
                document.getElementById(`nav-rewards-${type}`).className = type === 'desk'
                    ? 'w-full flex items-center gap-3 text-stone-600 p-4 hover:bg-stone-200 rounded-2xl transition-all'
                    : 'flex flex-col items-center justify-center text-stone-500 px-5 py-2 hover:bg-emerald-50 rounded-2xl transition-all font-label text-[10px] font-semibold';
            });

            if (screenId === 'units') {
                document.getElementById('topbar-title').innerText = '5학년 1학기 수학 정원';
                document.getElementById('screen-units').classList.remove('hidden');
                document.getElementById('nav-units-desk').className = 'w-full flex items-center gap-3 bg-emerald-100 text-emerald-900 rounded-2xl p-4 transition-all';
                document.getElementById('nav-units-mob').className = 'flex flex-col items-center justify-center bg-emerald-100 text-emerald-800 rounded-2xl px-5 py-2 font-label text-[10px] font-semibold transition-all';
                renderUnits();
            } else if (screenId === 'stages') {
                if (activeUnitIndex === -1) {
                    showToast('내 정원(Garden)에서 단원을 먼저 선택해주세요.');
                    navTo('units');
                    return;
                }
                const unit = gardenData[activeUnitIndex];
                document.getElementById('topbar-title').innerText = unit.title;
                document.getElementById('screen-stages').classList.remove('hidden');
                document.getElementById('nav-stages-desk').className = 'w-full flex items-center gap-3 bg-emerald-100 text-emerald-900 rounded-2xl p-4 transition-all';
                document.getElementById('nav-stages-mob').className = 'flex flex-col items-center justify-center bg-emerald-100 text-emerald-800 rounded-2xl px-5 py-2 font-label text-[10px] font-semibold transition-all';
                renderStages();
            } else if (screenId === 'rewards') {
                document.getElementById('topbar-title').innerText = '나의 보상';
                document.getElementById('screen-rewards').classList.remove('hidden');
                document.getElementById('nav-rewards-desk').className = 'w-full flex items-center gap-3 bg-emerald-100 text-emerald-900 rounded-2xl p-4 transition-all';
                document.getElementById('nav-rewards-mob').className = 'flex flex-col items-center justify-center bg-emerald-100 text-emerald-800 rounded-2xl px-5 py-2 font-label text-[10px] font-semibold transition-all';
                renderRewards();
            }

                                    </div>
                                    <div class="text-right">
                                        <div class="text-sm text-stone-500 uppercase tracking-widest font-semibold">진행</div>
                                        <div class="font-serif text-2xl text-stone-800 border-b border-stone-300 inline-block min-w-[3rem] text-center" id="score-header-text">?/8</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="space-y-2">
                                ${questionsHTML}
                            </div>
                        </div>

                        <div class="flex justify-end pt-4 pb-8">
                            <button onclick="submitWorksheet()" class="bg-gradient-to-r from-tertiary to-tertiary-dim text-on-tertiary px-10 py-4 rounded-[1.5rem] font-bold text-lg shadow-[0_8px_20px_rgba(172,45,94,0.3)] hover:shadow-[0_12px_25px_rgba(172,45,94,0.4)] transition-all duration-300 active:scale-95 flex items-center gap-3">
                                <span class="material-symbols-outlined" data-icon="nutrition" data-weight="fill">nutrition</span>
                                정답 수확하기 (제출)
                            </button>
                        </div>
                    </div>
                `;
            }

            quizContainer.innerHTML = contentHTML;

            document.getElementById('screen-stages').classList.add('hidden');
            quizContainer.classList.remove('hidden');
            
            updateNameDisplay(appState.studentName);
            document.getElementById('main-scroll-area').scrollTop = 0;
            
            setTimeout(() => {
                const firstInput = document.getElementById('answer-input-0');
                if(firstInput) firstInput.focus();
            }, 100);
        }

        function closeWorksheet() {
            if(confirm('문제 풀이를 그만두시겠습니까? 풀고 있던 답안은 보관되지 않습니다.')) {
                navTo('stages');
            }
        }

        function submitWorksheet() {
            const unit = gardenData[activeUnitIndex];
            const ws = unit.worksheets[activeWorksheetIndex];
            const total = ws.questions.length;
            let correctCount = 0;
            let allCorrect = true;

            for (let i = 0; i < total; i++) {
                const inputEl = document.getElementById(`answer-input-${i}`);
                if (!inputEl) continue;
                
                if (inputEl.readOnly) {
                    correctCount++;
                    continue; 
                }

                const rawUserAnswer = inputEl.value.trim();
                const userAnswer = rawUserAnswer.replace(/\s+/g, ''); 
                const correctAnswer = ws.questions[i].a.replace(/\s+/g, '');

                if (userAnswer === '') {
                    allCorrect = false;
                    continue; 
                }

                if (userAnswer === correctAnswer) {
                    correctCount++;
                    inputEl.readOnly = true;
                    inputEl.classList.remove('border-stone-400', 'border-error', 'text-error', 'bg-error/5');
                    inputEl.classList.add('border-primary', 'text-primary', 'bg-primary/10', 'pointer-events-none');
                } else {
                    allCorrect = false;
                    failCounts[i]++;
                    inputEl.classList.remove('border-stone-400');
                    inputEl.classList.add('border-error', 'text-error', 'bg-error/5');
                    
                    if (failCounts[i] >= 3) {
                        const expContainer = document.getElementById(`exp-container-${i}`);
                        if(expContainer) expContainer.classList.remove('hidden');
                    }
                }
            }

            const pct = Math.max(5, (correctCount / total) * 100);
            
            if (activeWorksheetIndex === 2) {
                const pt = document.getElementById(`progress-text-2`);
                if(pt) pt.innerText = `8개 중 ${correctCount}개 수확함`;
            } else {
                const pb = document.getElementById(`progress-bar-${activeWorksheetIndex}`);
                if(pb) pb.style.width = `${pct}%`;
                const pt = document.getElementById(`progress-text-${activeWorksheetIndex}`);
                if(pt) pt.innerHTML = `<span class="material-symbols-outlined text-sm" data-icon="check_circle">check_circle</span> ${correctCount}/8 해결`;
            }
            
            const st = document.getElementById('score-header-text');
            if(st) st.innerText = `${correctCount}/8`;

            const isPassed = correctCount >= Math.floor(total / 2); 
            const feedbackText = getFeedback(activeWorksheetIndex, correctCount, total);
            const info = stageInfo[activeWorksheetIndex];

            const emojiEl = document.getElementById('result-emoji');
            const scoreEl = document.getElementById('result-score');
            const badgeEl = document.getElementById('result-badge');
            const modalBtn = document.getElementById('result-modal-btn');
            
            scoreEl.innerText = `${total}문제 중 ${correctCount}문제 정답.`;
            document.getElementById('result-feedback').innerText = feedbackText;

            if (isPassed) {
                emojiEl.innerText = info.emoji;
                badgeEl.innerText = '통과 / 성장 완료';
                badgeEl.className = `inline-block px-5 py-2 rounded-full text-sm font-extrabold mb-8 bg-${info.theme}-container text-on-${info.theme}-container shadow-sm`;
                
                if (unit.currentLevel === activeWorksheetIndex) {
                    unit.currentLevel += 1;
                    saveProgressLocal(unit.id, unit.currentLevel);
                }
            } else {
                emojiEl.innerText = '💦';
                badgeEl.innerText = '조금 더 노력이 필요해요.';
                badgeEl.className = 'inline-block px-5 py-2 rounded-full text-sm font-extrabold mb-8 bg-error-container text-on-error-container shadow-sm';
            }

            if (correctCount === total) {
                modalBtn.innerText = '성장 지도로 돌아가기';
                modalBtn.onclick = () => {
                    document.getElementById('result-modal').classList.add('hidden');
                    navTo('stages');
                };
            } else {
                modalBtn.innerText = '틀린 문제 다시 풀기';
                modalBtn.onclick = () => {
                    document.getElementById('result-modal').classList.add('hidden');
                    for (let i = 0; i < total; i++) {
                        const inputEl = document.getElementById(`answer-input-${i}`);
                        if (inputEl && !inputEl.readOnly) {
                            inputEl.focus();
                            break;
                        }
                    }
                };
            }

            document.getElementById('result-modal').classList.remove('hidden');
            
            emojiEl.classList.remove('plant-pop');
            void emojiEl.offsetWidth; 
            emojiEl.classList.add('plant-pop');
        }

        window.onload = () => {
            loadState();
            navTo('units');
        };
    </script>
</body>
</html>
