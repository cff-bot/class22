let sel1=null,sel2=null,sel3=null;

function updateBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  const parts=[sel1,sel2,sel3].filter(Boolean);
  if(!parts.length){bc.classList.add('hidden');return;}
  bc.classList.remove('hidden');
  bc.innerHTML='선택: '+parts.map((p,i)=>`<span>${p}</span>${i<parts.length-1?' › ':''}`).join('');
}

function renderChips(cid,items,sel,fn){
  const el=document.getElementById(cid);
  el.innerHTML='';
  items.forEach(item=>{
    const b=document.createElement('button');
    b.className='chip'+(item===sel?' sel':'');
    b.textContent=item;
    b.onclick=()=>fn(item);
    el.appendChild(b);
  });
}

function init(){
  sel1=null;sel2=null;sel3=null;
  renderChips('chips1',Object.keys(tree),null,s1);
  ['step2','step3','result-area'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('breadcrumb').classList.add('hidden');
}

function s1(v){
  sel1=v;sel2=null;sel3=null;
  renderChips('chips1',Object.keys(tree),sel1,s1);
  document.getElementById('label2').textContent=`"${v}" 중에서 어떤 걸 발표할까요?`;
  renderChips('chips2',tree[v].sub,null,s2);
  document.getElementById('step2').classList.remove('hidden');
  document.getElementById('step3').classList.add('hidden');
  document.getElementById('result-area').classList.add('hidden');
  updateBreadcrumb();
}

function s2(v){
  sel2=v;sel3=null;
  renderChips('chips2',tree[sel1].sub,sel2,s2);
  document.getElementById('label3').textContent=`"${v}"에서 어떤 내용을 발표할까요?`;
  renderChips('chips3',tree[sel1].detail[v]||[],null,s3);
  document.getElementById('step3').classList.remove('hidden');
  document.getElementById('result-area').classList.add('hidden');
  updateBreadcrumb();
}

function s3(v){
  sel3=v;
  renderChips('chips3',tree[sel1].detail[sel2],sel3,s3);
  document.getElementById('result-text').textContent=`${sel1} › ${sel2} › ${v}`;
  const hintData=hints[v];
  const hb=document.getElementById('hint-box');
  const hl=document.getElementById('hint-list');
  if(hintData&&hintData.length){
    hl.innerHTML=hintData.map(h=>`• ${h}`).join('<br>');
    hb.classList.remove('hidden');
  } else {
    hb.classList.add('hidden');
  }
  document.getElementById('result-area').classList.remove('hidden');
  updateBreadcrumb();
}

document.getElementById('btn-reset').onclick=init;
init();
