<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인구 분포 짝 맞추기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ebe3;
  --ink: #1e1a16;
  --ink-soft: #7a6f64;
  --card-back: #3d6b4f;
  --card-back-2: #2d5240;
  --problem: #c0392b;
  --problem-soft: #fde8e6;
  --solution: #1e6b8a;
  --solution-soft: #e6f3f8;
  --p1: #d65a3a;
  --p1-soft: #fbe8e0;
  --p2: #2980b9;
  --p2-soft: #ddeef8;
  --matched: #27ae60;
  --matched-soft: #e8f8ee;
  --gold: #c8892a;
  --radius: 14px;
  --shadow: 0 6px 24px rgba(0,0,0,0.13);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body {
  font-family: "Pretendard Variable", Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 16px;
}
body {
  background-image:
    radial-gradient(ellipse at 0% 0%, rgba(214,90,58,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 100%, rgba(41,128,185,0.07) 0%, transparent 50%);
}

/* ======= 시작화면 ======= */
#start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 20px;
}
.hero-tag {
  font-family: 'Gaegu', sans-serif;
  font-size: 20px;
  color: var(--card-back);
  background: rgba(61,107,79,0.12);
  padding: 6px 20px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: -1.5px;
  text-align: center;
  line-height: 1.15;
  margin-bottom: 8px;
}
.hero-title span { color: var(--card-back); }
.hero-sub {
  color: var(--ink-soft);
  font-size: 16px;
  text-align: center;
  margin-bottom: 32px;
  font-family: 'Gaegu', sans-serif;
  font-size: 19px;
}

.setup-box {
  background: white;
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,0.07);
}
.setup-box h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink-soft);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.player-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.player-input-wrap { display: flex; flex-direction: column; gap: 6px; }
.player-label {
  font-size: 13px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  width: fit-content;
}
.label-p1 { background: var(--p1-soft); color: var(--p1); }
.label-p2 { background: var(--p2-soft); color: var(--p2); }

.name-input {
  width: 100%;
  padding: 12px 14px;
  font-size: 16px;
  border: 2px solid #e0d8cc;
  border-radius: 10px;
  font-family: inherit;
  color: var(--ink);
  transition: border-color 0.2s;
  background: #faf8f5;
}
.name-input:focus { outline: none; border-color: var(--card-back); }

.divider {
  border: none;
  border-top: 1px dashed #d8d0c4;
  margin: 20px 0;
}

.rule-list {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.8;
  list-style: none;
}
.rule-list li::before { content: '▸ '; color: var(--card-back); font-weight: 700; }

.btn-start {
  width: 100%;
  margin-top: 22px;
  padding: 16px;
  font-size: 18px;
  font-weight: 800;
  font-family: inherit;
  background: var(--card-back);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 4px 0 var(--card-back-2);
  letter-spacing: -0.5px;
}
.btn-start:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--card-back-2); }
.btn-start:disabled { background: #b8b0a4; box-shadow: 0 4px 0 #9a9288; cursor: not-allowed; }

/* ======= 게임화면 ======= */
#game-screen { display: none; flex-direction: column; min-height: 100vh; }

/* 상단 점수바 */
.scorebar {
  background: white;
  border-bottom: 2px solid rgba(0,0,0,0.10);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  z-index: 20;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  flex-shrink: 0;
}
.score-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 16px;
  flex: 1;
  justify-content: center;
  transition: all 0.3s;
}
.score-chip.active { transform: scale(1.05); box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
.chip-p1 { background: var(--p1-soft); color: var(--p1); }
.chip-p2 { background: var(--p2-soft); color: var(--p2); }
.chip-score { font-size: 22px; font-family: 'Gaegu', 'Noto Sans KR', sans-serif; }

.turn-badge {
  font-size: 13px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 999px;
  white-space: nowrap;
  transition: all 0.3s;
}
.turn-p1 { background: var(--p1); color: white; }
.turn-p2 { background: var(--p2); color: white; }

/* 진행도 */
.progress-wrap {
  padding: 8px 20px 4px;
  font-size: 13px;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.progress-track {
  flex: 1;
  height: 5px;
  background: #e0d8cc;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--matched), var(--card-back));
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* 카드 그리드 */
.grid-wrap { padding: 12px 16px 100px; flex: 1; }
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 700px;
  margin: 0 auto;
}

/* 카드 */
.card {
  aspect-ratio: 3/4;
  position: relative;
  cursor: pointer;
  user-select: none;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0.0, 0.2, 1);
  border-radius: var(--radius);
}
.card.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  text-align: center;
}

/* 뒷면 */
.card-back-face {
  background: linear-gradient(135deg, var(--card-back) 0%, var(--card-back-2) 100%);
  box-shadow: var(--shadow);
  flex-direction: column;
  gap: 8px;
}
.card-back-face .back-icon {
  font-size: 28px;
  opacity: 0.7;
}
.card-back-face .back-label {
  font-family: 'Gaegu', sans-serif;
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  font-weight: 700;
}

/* 앞면 */
.card-front-face {
  transform: rotateY(180deg);
  flex-direction: column;
  gap: 6px;
  box-shadow: var(--shadow);
}
.card-type-badge {
  font-size: 11px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.card-text {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.45;
  font-family: "Pretendard Variable", Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  word-break: keep-all;
}
.card-emoji {
  font-size: 22px;
  flex-shrink: 0;
}

/* 문제 카드 */
.type-problem .card-front-face {
  background: var(--problem-soft);
  border: 2px solid rgba(192,57,43,0.3);
}
.type-problem .card-type-badge { background: var(--problem); color: white; }

/* 해결 카드 */
.type-solution .card-front-face {
  background: var(--solution-soft);
  border: 2px solid rgba(30,107,138,0.3);
}
.type-solution .card-type-badge { background: var(--solution); color: white; }

/* 매칭됨 */
.card.matched .card-front-face {
  background: var(--matched-soft) !important;
  border-color: rgba(39,174,96,0.4) !important;
}
.card.matched .card-type-badge { background: var(--matched) !important; }
.card.matched { cursor: default; }
.card.matched .card-inner { animation: matchPop 0.4s ease; }
@keyframes matchPop {
  0% { transform: rotateY(180deg) scale(1); }
  40% { transform: rotateY(180deg) scale(1.1); }
  100% { transform: rotateY(180deg) scale(1); }
}

/* 틀렸을 때 */
.card.wrong .card-inner { animation: shake 0.4s ease; }
@keyframes shake {
  0%, 100% { transform: rotateY(180deg) translateX(0); }
  25% { transform: rotateY(180deg) translateX(-6px); }
  75% { transform: rotateY(180deg) translateX(6px); }
}

/* ======= 안내 배너 ======= */
.hint-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 12px 22px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  z-index: 30;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  transition: opacity 0.3s, transform 0.3s;
  font-family: 'Gaegu', sans-serif;
  font-size: 18px;
}
.hint-banner.p1 { background: var(--p1); }
.hint-banner.p2 { background: var(--p2); }
.hint-banner.matched-msg { background: var(--matched); }
.hint-banner.wrong-msg { background: #7f8c8d; }
.hint-banner.hidden-msg { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }

/* ======= 결과화면 ======= */
#result-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 20px;
  text-align: center;
}
.result-emoji { font-size: 72px; margin-bottom: 10px; }
.result-title {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 6px;
}
.result-sub {
  color: var(--ink-soft);
  font-family: 'Gaegu', sans-serif;
  font-size: 20px;
  margin-bottom: 28px;
}

.result-scores {
  display: flex;
  gap: 16px;
  margin-bottom: 28px;
  justify-content: center;
}
.result-score-card {
  background: white;
  border-radius: 16px;
  padding: 20px 28px;
  box-shadow: var(--shadow);
  min-width: 120px;
}
.result-score-card .rs-name {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 6px;
}
.result-score-card .rs-score {
  font-family: 'Gaegu', sans-serif;
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
}
.result-score-card.winner { border: 3px solid var(--gold); }
.result-score-card.winner .rs-score { color: var(--gold); }
.rs-p1 .rs-name { color: var(--p1); }
.rs-p2 .rs-name { color: var(--p2); }

.btn-restart {
  padding: 14px 36px;
  font-size: 17px;
  font-weight: 800;
  font-family: inherit;
  background: var(--card-back);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--card-back-2);
  transition: transform 0.1s;
}
.btn-restart:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--card-back-2); }

/* 카드 범례 */
.legend {
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 0 16px 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 999px;
}
.legend-problem { background: var(--problem-soft); color: var(--problem); }
.legend-solution { background: var(--solution-soft); color: var(--solution); }
</style>
</head>
<body>

<!-- ===== 시작화면 ===== -->
<div id="start-screen">
  <div class="hero-tag">🌏 인구 분포 단원</div>
  <h1 class="hero-title">문제 · 해결책<br><span>짝 맞추기</span></h1>
  <p class="hero-sub">같은 쌍을 먼저 찾는 사람이 이겨요!</p>

  <div class="setup-box">
    <h2>플레이어 이름</h2>
    <div class="player-row">
      <div class="player-input-wrap">
        <span class="player-label label-p1">🔴 1번</span>
        <input class="name-input" id="name1" type="text" placeholder="이름 입력" maxlength="8">
      </div>
      <div class="player-input-wrap">
        <span class="player-label label-p2">🔵 2번</span>
        <input class="name-input" id="name2" type="text" placeholder="이름 입력" maxlength="8">
      </div>
    </div>

    <hr class="divider">

    <ul class="rule-list">
      <li>카드를 한 번씩 번갈아 뒤집어요</li>
      <li><strong>문제 카드</strong>와 <strong>해결책 카드</strong>가 짝을 이루면 점수 +1</li>
      <li>짝이 맞으면 한 번 더 뒤집을 수 있어요</li>
      <li>총 8쌍 — 먼저 더 많이 찾는 사람이 승리!</li>
    </ul>

    <button class="btn-start" id="start-btn" disabled onclick="startGame()">게임 시작! 🎴</button>
  </div>
</div>

<!-- ===== 게임화면 ===== -->
<div id="game-screen">
  <div class="scorebar">
    <div class="score-chip chip-p1" id="chip-p1">
      <span id="name-p1-display">1번</span>
      <span class="chip-score" id="score-p1">0</span>
    </div>
    <div class="turn-badge" id="turn-badge">1번 차례</div>
    <div class="score-chip chip-p2" id="chip-p2">
      <span class="chip-score" id="score-p2">0</span>
      <span id="name-p2-display">2번</span>
    </div>
  </div>

  <div class="progress-wrap">
    <span id="progress-text">0 / 8 쌍 찾음</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="legend">
    <div class="legend-item legend-problem">🔴 문제상황</div>
    <div class="legend-item legend-solution">🔵 해결책</div>
  </div>

  <div class="grid-wrap">
    <div class="card-grid" id="card-grid"></div>
  </div>

  <div class="hint-banner hidden-msg" id="hint-banner"></div>
</div>

<!-- ===== 결과화면 ===== -->
<div id="result-screen">
  <div class="result-emoji" id="result-emoji">🏆</div>
  <h2 class="result-title" id="result-title">게임 종료!</h2>
  <p class="result-sub" id="result-sub">수고했어요!</p>
  <div class="result-scores">
    <div class="result-score-card rs-p1" id="result-card-p1">
      <div class="rs-name" id="result-name-p1">1번</div>
      <div class="rs-score" id="result-score-p1">0</div>
    </div>
    <div class="result-score-card rs-p2" id="result-card-p2">
      <div class="rs-name" id="result-name-p2">2번</div>
      <div class="rs-score" id="result-score-p2">0</div>
    </div>
  </div>
  <button class="btn-restart" onclick="location.reload()">다시 하기 🔄</button>
</div>

<script>
// ===== 카드 데이터 (8쌍) =====
const PAIRS = [
  {
    id: 1,
    problem: { emoji: '🚗', text: '수도권에 교통 혼잡과\n환경 오염이 심해짐' },
    solution: { emoji: '🏙️', text: '공공 기관을 지방으로\n이전하여 인구 분산' }
  },
  {
    id: 2,
    problem: { emoji: '🏠', text: '수도권의 주택 부족과\n집값이 크게 오름' },
    solution: { emoji: '🌱', text: '혁신 도시를 만들어\n기업과 일자리를 유치' }
  },
  {
    id: 3,
    problem: { emoji: '🏚️', text: '비수도권에 빈집이 늘어\n안전·환경 문제 발생' },
    solution: { emoji: '💝', text: '고향 사랑 기부제로\n지역 경제를 지원' }
  },
  {
    id: 4,
    problem: { emoji: '👴', text: '비수도권에 노년층 비율이\n높아지고 청장년층이 줄어듦' },
    solution: { emoji: '🎓', text: '작은 학교 살리기로\n특별 교육과정 운영' }
  },
  {
    id: 5,
    problem: { emoji: '🏥', text: '비수도권의 병원·마트 등\n생활 시설이 줄어듦' },
    solution: { emoji: '🪪', text: '디지털 관광 주민증 발급으로\n지역 관광객 유치' }
  },
  {
    id: 6,
    problem: { emoji: '🥬', text: '인구가 줄어 신선 식품을\n구하기 어려운 식품 사막' },
    solution: { emoji: '🛒', text: '지역 특산물 구매와\n지역 여행으로 경제 활성화' }
  },
  {
    id: 7,
    problem: { emoji: '👨‍🎓', text: '20대 청년들이 취업·학업을\n위해 수도권으로 이동' },
    solution: { emoji: '💡', text: '로컬 크리에이터 육성으로\n지역에 새로운 활력 창출' }
  },
  {
    id: 8,
    problem: { emoji: '📉', text: '신입생이 없는 학교가 늘고\n지역 학교들이 폐교됨' },
    solution: { emoji: '🏠', text: '주거·교육 환경 개선과\n청년 정착 지원 정책' }
  }
];

let p1Name = '1번';
let p2Name = '2번';
let currentPlayer = 1;
let scores = [0, 0];
let flippedCards = [];
let matchedPairs = 0;
let isLocked = false;
let bannerTimer = null;

document.getElementById('name1').addEventListener('input', checkNames);
document.getElementById('name2').addEventListener('input', checkNames);
function checkNames() {
  const n1 = document.getElementById('name1').value.trim();
  const n2 = document.getElementById('name2').value.trim();
  document.getElementById('start-btn').disabled = !(n1 && n2);
}

function startGame() {
  p1Name = document.getElementById('name1').value.trim();
  p2Name = document.getElementById('name2').value.trim();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('game-screen').style.flexDirection = 'column';
  document.getElementById('name-p1-display').textContent = p1Name;
  document.getElementById('name-p2-display').textContent = p2Name;
  buildGrid();
  updateUI();
  showBanner(`${p1Name}부터 시작!`, 'p1', 2000);
}

function buildGrid() {
  const cards = [];
  PAIRS.forEach(pair => {
    cards.push({ pairId: pair.id, type: 'problem', emoji: pair.problem.emoji, text: pair.problem.text });
    cards.push({ pairId: pair.id, type: 'solution', emoji: pair.solution.emoji, text: pair.solution.text });
  });
  // shuffle
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }

  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  cards.forEach((c, idx) => {
    const typeLabel = c.type === 'problem' ? '🔴 문제상황' : '🔵 해결책';
    const div = document.createElement('div');
    div.className = `card type-${c.type}`;
    div.dataset.idx = idx;
    div.dataset.pairId = c.pairId;
    div.dataset.type = c.type;
    div.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back-face">
          <div class="back-icon">🌏</div>
          <div class="back-label">카드</div>
        </div>
        <div class="card-face card-front-face">
          <span class="card-type-badge">${typeLabel}</span>
          <span class="card-emoji">${c.emoji}</span>
          <span class="card-text">${c.text.replace(/\n/g, '<br>')}</span>
        </div>
      </div>
    `;
    div.addEventListener('click', () => flipCard(div));
    grid.appendChild(div);
  });
}

function flipCard(card) {
  if (isLocked) return;
  if (card.classList.contains('flipped')) return;
  if (card.classList.contains('matched')) return;

  card.classList.add('flipped');
  flippedCards.push(card);

  if (flippedCards.length === 2) {
    isLocked = true;
    checkMatch();
  }
}

function checkMatch() {
  const [c1, c2] = flippedCards;
  const samePair = c1.dataset.pairId === c2.dataset.pairId;
  const diffType = c1.dataset.type !== c2.dataset.type;

  if (samePair && diffType) {
    // 맞음
    setTimeout(() => {
      c1.classList.add('matched');
      c2.classList.add('matched');
      scores[currentPlayer - 1]++;
      matchedPairs++;
      flippedCards = [];
      isLocked = false;
      updateUI();
      showBanner(`✨ 짝! ${currentPlayer === 1 ? p1Name : p2Name} +1점`, currentPlayer === 1 ? 'p1' : 'p2', 1500);

      if (matchedPairs === PAIRS.length) {
        setTimeout(showResult, 800);
      }
    }, 600);
  } else {
    // 틀림
    setTimeout(() => {
      c1.classList.add('wrong');
      c2.classList.add('wrong');
      setTimeout(() => {
        c1.classList.remove('flipped', 'wrong');
        c2.classList.remove('flipped', 'wrong');
        flippedCards = [];
        isLocked = false;
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateUI();
        showBanner(`${currentPlayer === 1 ? p1Name : p2Name} 차례예요`, currentPlayer === 1 ? 'p1' : 'p2', 1500);
      }, 500);
    }, 700);
  }
}

function updateUI() {
  document.getElementById('score-p1').textContent = scores[0];
  document.getElementById('score-p2').textContent = scores[1];

  const chip1 = document.getElementById('chip-p1');
  const chip2 = document.getElementById('chip-p2');
  chip1.classList.toggle('active', currentPlayer === 1);
  chip2.classList.toggle('active', currentPlayer === 2);

  const badge = document.getElementById('turn-badge');
  badge.textContent = `${currentPlayer === 1 ? p1Name : p2Name} 차례`;
  badge.className = `turn-badge turn-p${currentPlayer}`;

  const pct = (matchedPairs / PAIRS.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${matchedPairs} / ${PAIRS.length} 쌍 찾음`;
}

function showBanner(msg, cls, duration) {
  const b = document.getElementById('hint-banner');
  b.textContent = msg;
  b.className = `hint-banner ${cls}`;
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => {
    b.className = 'hint-banner hidden-msg';
  }, duration);
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'flex';

  document.getElementById('result-name-p1').textContent = p1Name;
  document.getElementById('result-name-p2').textContent = p2Name;
  document.getElementById('result-score-p1').textContent = scores[0];
  document.getElementById('result-score-p2').textContent = scores[1];

  const rc1 = document.getElementById('result-card-p1');
  const rc2 = document.getElementById('result-card-p2');
  rc1.classList.remove('winner');
  rc2.classList.remove('winner');

  let emoji, title, sub;
  if (scores[0] > scores[1]) {
    emoji = '🏆'; title = `${p1Name} 승리!`; sub = '인구 분포 박사 등극!';
    rc1.classList.add('winner');
  } else if (scores[1] > scores[0]) {
    emoji = '🏆'; title = `${p2Name} 승리!`; sub = '인구 분포 박사 등극!';
    rc2.classList.add('winner');
  } else {
    emoji = '🤝'; title = '무승부!'; sub = '둘 다 완벽해요!';
    rc1.classList.add('winner'); rc2.classList.add('winner');
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
}
</script>
</body>
</html>
